# Compose para produção — usa imagem pré-buildada, sem build local.
# Uso:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Variáveis obrigatórias no .env do servidor (ou via secrets do orquestrador):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY   ← embutida no bundle — deve ser a mesma usada no build
#   SUPABASE_SERVICE_ROLE_KEY
#   NEXT_PUBLIC_APP_URL             ← ex: https://gestaopro.pronutrir.com.br
#   APP_VERSION                     ← ex: 2026-05-04-00

services:
  app:
    image: pronutrir/gestaopro:${APP_VERSION:-2026-05-22-01}
    container_name: gestaopro
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - gestaopro-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.pronutrir.description=GestãoPro frontend"
      - "com.pronutrir.version=${APP_VERSION:-2026-05-22-01}"

  proxy:
    image: nginx:1.27-alpine
    container_name: gestaopro-proxy
    ports:
      - "80:80"        # acesso direto por IP (exige regra 80 no NSG)
      - "8080:80"      # rota do domínio: VM de serviços (TLS) repassa para cá
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - gestaopro-net

# Rede compartilhada com o stack do Supabase (kong).
# Criar antes na VM: docker network create gestaopro-net
networks:
  gestaopro-net:
    external: true
