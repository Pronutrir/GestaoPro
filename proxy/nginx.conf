map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Atrás do proxy TLS do domínio (VM de serviços), preserva o proto original (https);
# em acesso direto usa o scheme da conexão.
map $http_x_forwarded_proto $fwd_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    # DNS interno do docker com TTL curto: containers recriados (IP novo)
    # passam a ser resolvidos sem precisar reiniciar o proxy.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $kong_upstream http://kong:8000;
    set $app_upstream  http://app:8080;

    # Storage FILE_SIZE_LIMIT=50MB + margem para multipart
    client_max_body_size 60m;

    # Cookies de sessão do Supabase com tokens Azure passam de 8k
    # (o app roda Node com --max-http-header-size=32768 pelo mesmo motivo).
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;
    large_client_header_buffers 4 32k;

    # REST / Auth / Storage -> Kong (Supabase interno)
    location ~ ^/(rest|auth|storage)/v1/ {
        proxy_pass $kong_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }

    # Realtime -> Kong (upgrade de WebSocket obrigatório)
    location /realtime/v1/ {
        proxy_pass $kong_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Todo o resto -> Next.js
    location / {
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_set_header X-Forwarded-Host $host;
    }
}
