services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        APP_VERSION: ${APP_VERSION:-2026-05-22-01}
    image: pronutrir/gestaopro:${APP_VERSION:-2026-05-22-01}
    container_name: gestaopro
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    networks:
      - gestaopro-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 256M
        reservations:
          cpus: "0.50"
          memory: 128M
    labels:
      - "com.pronutrir.description=GestãoPro frontend"

  proxy:
    image: nginx:1.27-alpine
    container_name: gestaopro-proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - gestaopro-net

# Rede compartilhada com o stack do Supabase (kong).
# Criar antes na VM: docker network create gestaopro-net
networks:
  gestaopro-net:
    external: true
